<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silsilah Keluarga / Tarombo</title>
    
    <!-- Memuat Library Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #fdfbf7; padding: 40px 20px; 
            text-align: center; overflow-x: auto;
        }

        /* --- DESAIN MENU LOGIN --- */
        #login-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center;
            z-index: 9999;
        }
        .login-box {
            background: white; padding: 30px; border-radius: 12px;
            width: 90%; max-width: 350px; text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .login-box h3 { margin-bottom: 10px; color: #451a03; font-size: 22px; }
        .login-box p { margin-bottom: 20px; color: #78350f; font-size: 14px; }
        .login-box input {
            width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #d97706; 
            border-radius: 6px; font-size: 14px; background-color: #fef3c7;
        }
        .btn-login {
            width: 100%; padding: 12px; border: none; border-radius: 6px; 
            font-weight: bold; cursor: pointer; margin-bottom: 10px; font-size: 14px; transition: 0.2s;
        }
        .btn-admin-login { background-color: #0284c7; color: white; }
        .btn-admin-login:hover { background-color: #0369a1; transform: scale(1.02); }
        .btn-tamu-login { background-color: #10b981; color: white; }
        .btn-tamu-login:hover { background-color: #059669; transform: scale(1.02); }

        /* --- DESAIN MENU PEMBAYARAN QRIS --- */
        #payment-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center;
            z-index: 10000;
        }
        .payment-box {
            background: white; padding: 30px; border-radius: 12px;
            width: 90%; max-width: 380px; text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 3px solid #ef4444;
        }
        .payment-box img {
            width: 100%; max-width: 250px; border-radius: 8px; margin-bottom: 15px;
            border: 2px dashed #b45309; padding: 5px;
        }
        .payment-text {
            font-size: 16px; color: #451a03; margin-bottom: 10px; line-height: 1.5;
        }
        .price-strike {
            text-decoration: line-through; color: #991b1b; font-weight: normal; margin-right: 5px;
        }
        .price-discount {
            font-weight: bold; color: #10b981; font-size: 22px;
        }
        
        /* --- NAVIGASI ATAS & PENCARIAN --- */
        .top-nav {
            display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; flex-wrap: wrap;
        }
        .btn-nav {
            background-color: #451a03; color: white; border: none; padding: 10px 20px; 
            border-radius: 8px; font-weight: bold; cursor: pointer; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.2); transition: 0.2s;
        }
        .btn-nav:hover { background-color: #78350f; transform: scale(1.05); }
        #btn-back { display: none; }
        
        #btn-full { background-color: #0284c7; }
        #btn-full:hover { background-color: #0369a1; }
        
        #btn-print { background-color: #d97706; display: none; }
        #btn-print:hover { background-color: #b45309; transform: scale(1.05); }

        #btn-lock { background-color: #dc2626; display: none; }
        #btn-lock:hover { background-color: #991b1b; transform: scale(1.05); }

        /* Desain Kolom Pencarian Cerdas */
        .search-container {
            position: relative; display: inline-block; width: 100%; max-width: 400px; 
            margin: 0 auto 20px auto; text-align: left; z-index: 100;
        }
        #search-input {
            width: 100%; padding: 12px 15px; border: 2px solid #b45309; border-radius: 8px; 
            font-size: 15px; font-weight: bold; background-color: white; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); outline: none;
        }
        #search-input:focus { border-color: #0284c7; box-shadow: 0 4px 8px rgba(2,132,199,0.3); }
        
        #search-results {
            position: absolute; top: 110%; left: 0; width: 100%; background: white; 
            border: 2px solid #d97706; border-radius: 8px; max-height: 250px; 
            overflow-y: auto; box-shadow: 0 8px 16px rgba(0,0,0,0.2); display: none;
        }
        .search-item {
            padding: 12px 15px; border-bottom: 1px solid #fef3c7; cursor: pointer; 
            color: #78350f; transition: 0.2s;
        }
        .search-item:hover { background-color: #fde68a; }
        .search-item strong { font-size: 15px; display: block; color: #451a03; }
        .search-item span { font-size: 12px; color: #b45309; }

        p.petunjuk { color: #8b4513; margin-bottom: 20px; font-size: 14px; font-weight: bold; background: #fef3c7; padding: 10px; border-radius: 8px; display: inline-block; border: 1px dashed #b45309; }

        /* --- STRUKTUR AKAR (ANTI-MENUMPUK) --- */
        .tree { display: inline-block; white-space: nowrap; min-width: max-content; }
        .tree ul { padding-top: 20px; position: relative; display: flex; justify-content: center; min-width: max-content; }
        .tree li { 
            text-align: center; list-style-type: none; position: relative; 
            padding: 20px 10px 0 10px; display: flex; flex-direction: column; align-items: center; flex-shrink: 0; 
        }
        .tree li::before, .tree li::after { 
            content: ''; position: absolute; top: 0; right: 50%; 
            border-top: 2px solid #8b4513; width: 50%; height: 20px; 
        }
        .tree li::after { right: auto; left: 50%; border-left: 2px solid #8b4513; }
        .tree li:only-child::after, .tree li:only-child::before { display: none; }
        .tree li:only-child { padding-top: 0; }
        .tree li:first-child::before, .tree li:last-child::after { border: 0 none; }
        .tree li:last-child::before { border-right: 2px solid #8b4513; border-radius: 0 5px 0 0; }
        .tree li:first-child::after { border-radius: 5px 0 0 0; }
        .tree ul ul::before { 
            content: ''; position: absolute; top: 0; left: 50%; 
            border-left: 2px solid #8b4513; width: 0; height: 20px; 
            transform: translateX(-50%); 
        }

        .node { 
            background-color: #fef3c7; border: 2px solid #b45309; 
            padding: 15px 20px; border-radius: 10px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            position: relative; min-width: 200px; max-width: 250px; 
            transition: 0.3s ease-in-out; display: inline-block;
            text-align: left; white-space: normal; 
        }
        .node:hover { background-color: #fde68a; box-shadow: 0 6px 12px rgba(0,0,0,0.15); }

        .info-row { display: flex; align-items: flex-start; margin-bottom: 8px; font-size: 14px; color: #78350f; line-height: 1.4; }
        .label { white-space: nowrap; margin-right: 5px; }

        .node span.editable { 
            flex: 1; display: inline-block; font-weight: bold; 
            outline: none; border-bottom: 1px dashed #d97706; 
            padding-bottom: 2px; cursor: text; min-width: 50px; word-wrap: break-word; 
        }
        .node span.editable:focus { background-color: #fff; border-bottom-style: solid; border-radius: 4px;}
        .node span.readonly { 
            flex: 1; display: inline-block; font-weight: bold; 
            outline: none; border-bottom: none; padding-bottom: 2px; 
            min-width: 50px; word-wrap: break-word; color: #451a03; 
        }

        .btn-container { text-align: center; margin-top: 10px; }

        .btn-add { 
            background-color: #10b981; color: white; border: none; border-radius: 50%; cursor: pointer; 
            font-weight: bold; width: 28px; height: 28px; font-size: 18px; 
            display: inline-flex; align-items: center; justify-content: center; transition: 0.2s; 
        }
        .btn-add:hover { background-color: #059669; transform: scale(1.1); }

        .btn-focus {
            background-color: #0284c7; color: white; border: none; padding: 8px 12px; border-radius: 6px; 
            cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s;
        }
        .btn-focus:hover { background-color: #0369a1; transform: translateY(-2px); }

        .btn-del { 
            background-color: #ef4444; color: white; border: none; border-radius: 50%; cursor: pointer; 
            font-weight: bold; width: 22px; height: 22px; font-size: 12px; 
            position: absolute; top: -10px; right: -10px; 
            display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.2s; 
        }
        .node:hover .btn-del { opacity: 1; }

        /* WADAH CETAK */
        #print-area { display: none; }

        @media print {
            @page { size: landscape; margin: 10mm; }
            body { background-color: white; padding: 0; width: max-content !important; }
            #login-modal, #payment-modal, .top-nav, .search-container, #teks-petunjuk, #family-tree { display: none !important; }
            #print-area { display: block !important; width: max-content !important; margin: 0 auto; }
            .node { box-shadow: none !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; page-break-inside: avoid; }
        }
    </style>
</head>
<body>

    <!-- OVERLAY LOGIN -->
    <div id="login-modal">
        <div class="login-box">
            <h3>Tarombo Keluarga</h3>
            <p>Silakan pilih mode akses Anda:</p>
            <button type="button" class="btn-login btn-tamu-login" onclick="masukTamu()">👤 MASUK SEBAGAI TAMU (Lihat Saja)</button>
            <hr style="margin: 20px 0; border: 0; border-top: 1px dashed #ccc;">
            <p style="margin-bottom: 10px; font-size: 13px;">Khusus Pengelola (Admin):</p>
            <input type="text" id="input-user" placeholder="Username ">
            <input type="password" id="input-pass" placeholder="Password ">
            <button type="button" class="btn-login btn-admin-login" onclick="masukAdmin()">👑 LOGIN ADMIN</button>
        </div>
    </div>

    <!-- OVERLAY PEMBAYARAN QRIS (PAYWALL) -->
    <div id="payment-modal">
        <div class="payment-box">
            <img src="logo.jpg" alt="Scan QRIS untuk Melanjutkan">
            <div class="payment-text">
                To continue the program please pay <br>
                <span class="price-strike">$15</span> discount 30% <span class="price-discount">$10,5</span>
            </div>
            <!-- Teks Terlihat Otomatis, Tanpa Box Mencolok -->
            <div style="margin-top: 15px; font-size: 13px; color: #6b7280; font-style: italic;">
             
            </div>
        </div>
    </div>

    <!-- PENCARIAN CERDAS -->
    <div class="search-container">
        <input type="text" id="search-input" placeholder="🔍 Ketik nama untuk mencari..." oninput="cariNamaKilat(this.value)">
        <div id="search-results"></div>
    </div>

    <!-- NAVIGASI & TOMBOL -->
    <div class="top-nav">
        <button id="btn-back" class="btn-nav" onclick="kembaliKeAtas()">⬅️ Kembali ke Tingkat Sebelumnya</button>
        <button id="btn-full" class="btn-nav" onclick="toggleFullView()">👁️ Lihat Full Silsilah</button>
        <button id="btn-print" class="btn-nav" onclick="unduhPDF()">📥 Unduh PDF</button>
        <button id="btn-lock" class="btn-nav" onclick="kunciAplikasi()">🔒 Kunci Kembali (Reset)</button>
    </div>
    
    <p class="petunjuk" id="teks-petunjuk">Memuat Silsilah...</p>

    <!-- WADAH TAMPILAN -->
    <div class="tree" id="family-tree"></div>
    <div class="tree" id="print-area"></div>

    <script>
        let isAdmin = false; 
        let isFullView = false; 
        let isAppPaid = false; 

        // INISIALISASI FIREBASE
        try {
            const firebaseConfig = {
              apiKey: "AIzaSyCjjdpq1WHpM93r2wd9nz-Yc_7eBfLfhz8",
              authDomain: "silsilah-opung.firebaseapp.com",
              databaseURL: "https://silsilah-opung-default-rtdb.firebaseio.com",
              projectId: "silsilah-opung",
              storageBucket: "silsilah-opung.firebasestorage.app",
              messagingSenderId: "164906763858",
              appId: "1:164906763858:web:e671eb32a8cf940560018b",
              measurementId: "G-QRDHE3JCGM"
            };

            firebase.initializeApp(firebaseConfig);
            var db = firebase.database();
            var treeRef = db.ref('silsilah_keluarga');
            var settingsRef = db.ref('app_settings');
        } catch (error) {
            console.error("Firebase Error: ", error);
        }

        // PANTAU STATUS PEMBAYARAN GLOBAL DARI DATABASE
        if (settingsRef) {
            settingsRef.on('value', (snapshot) => {
                const settings = snapshot.val();
                if (settings && settings.isPaid === true) {
                    isAppPaid = true;
                    // Jika layar pembayaran sedang terbuka, otomatis ditutup
                    if (document.getElementById('payment-modal').style.display === 'flex') {
                        document.getElementById('payment-modal').style.display = 'none';
                        if (typeof renderTree === "function") renderTree();
                    }
                } else {
                    isAppPaid = false;
                    // Jika aplikasi dikunci kembali oleh admin dan user bukan admin, kembalikan ke layar QRIS
                    if(!isAdmin && document.getElementById('login-modal').style.display === 'none') {
                        document.getElementById('payment-modal').style.display = 'flex';
                    }
                }
            });
        }

        function masukTamu() {
            isAdmin = false;
            document.getElementById('login-modal').style.display = 'none';
            
            if (isAppPaid) {
                if (typeof renderTree === "function") renderTree();
            } else {
                document.getElementById('payment-modal').style.display = 'flex';
            }
        }

        function masukAdmin() {
            const user = document.getElementById('input-user').value.trim();
            const pass = document.getElementById('input-pass').value.trim();

            if (user === "Admin" && pass === "Jumaeluk") {
                isAdmin = true;
                document.getElementById('login-modal').style.display = 'none';
                
                if (isAppPaid) {
                    // Jika tadi Anda tidak sengaja meng-ACC, Anda akan masuk ke sini.
                    alert("Berhasil masuk sebagai Admin!");
                    if (typeof renderTree === "function") renderTree();
                } else {
                    // JIKA BELUM DIBAYAR, MUNCULKAN PERTANYAAN UNTUK ADMIN
                    let konfirmasiAcc = confirm("⚠️ STATUS APLIKASI SAAT INI TERKUNCI\n\nApakah Anda ingin meng-ACC (Membuka Akses) untuk semua orang sekarang?");
                    
                    if (konfirmasiAcc) {
                        db.ref('app_settings').set({ isPaid: true }).then(() => {
                            alert("✅ Akses berhasil dibuka!");
                            if (typeof renderTree === "function") renderTree();
                        }).catch((error) => {
                            alert("Gagal meng-ACC pembayaran.");
                        });
                    } else {
                        alert("Anda masuk sebagai Admin. Akses tamu masih TERKUNCI.");
                        if (typeof renderTree === "function") renderTree();
                    }
                }
            } else {
                alert("Username atau Password salah!");
            }
        }

        // FUNGSI UNTUK MENGUNCI KEMBALI (RESET PEMBAYARAN)
        function kunciAplikasi() {
            if (!isAdmin) return;
            let yakin = confirm("🔒 YAKIN INGIN MENGUNCI KEMBALI APLIKASI?\n\nJika diklik OK, semua orang (Tamu) akan dimintai pembayaran QRIS lagi saat mengakses web ini.");
            if (yakin) {
                db.ref('app_settings').set({ isPaid: false }).then(() => {
                    alert("Aplikasi berhasil dikunci kembali! Status pembayaran telah direset.");
                    location.reload(); // Refresh halaman agar status langsung kembali ke awal
                }).catch(() => {
                    alert("Gagal mengunci aplikasi. Cek koneksi internet Anda.");
                });
            }
        }

        let globalData = {};
        let activeRootId = 'root'; 

        history.replaceState({ id: 'root' }, "", window.location.pathname);
        window.addEventListener('popstate', function(event) {
            if (event.state && event.state.id) {
                activeRootId = event.state.id;
            } else {
                activeRootId = 'root';
            }
            renderTree();
        });

        if (treeRef) {
            treeRef.on('value', (snapshot) => {
                globalData = snapshot.val();
                if (!globalData) {
                    treeRef.set({ "root": { id: "root", name: "Silsilah Keluarga", parentId: null } });
                    return;
                }
                renderTree();
            });
        }

        // FITUR PENCARIAN KILAT
        function cariNamaKilat(keyword) {
            const box = document.getElementById('search-results');
            if (keyword.trim() === '') {
                box.style.display = 'none';
                return;
            }
            const teksCari = keyword.toLowerCase();
            let hasilHTML = '';
            let jumlahDitemukan = 0;

            for (let id in globalData) {
                if (id === 'root') continue; 
                const dataOrang = globalData[id];
                const nama = dataOrang.name ? dataOrang.name.toLowerCase() : "";
                
                if (nama.includes(teksCari)) {
                    hasilHTML += `
                        <div class="search-item" onclick="klikHasilCari('${id}')">
                            <strong>${dataOrang.name}</strong>
                            <span>Status: ${dataOrang.status || '-'} | Pasangan: ${dataOrang.spouse || '-'}</span>
                        </div>
                    `;
                    jumlahDitemukan++;
                }
            }

            if (jumlahDitemukan === 0) hasilHTML = `<div class="search-item" style="color:red; text-align:center;">❌ Nama tidak ditemukan</div>`;
            box.innerHTML = hasilHTML;
            box.style.display = 'block';
        }

        function klikHasilCari(id) {
            document.getElementById('search-input').value = ''; 
            document.getElementById('search-results').style.display = 'none'; 
            fokusKe(id); 
        }

        // MODE FULL SCREEN
        function toggleFullView() {
            isFullView = !isFullView;
            if (isFullView) {
                activeRootId = 'root'; 
                history.pushState({ id: 'root' }, "", "?kamar=root&full=true");
            } else {
                activeRootId = 'root'; 
                history.pushState({ id: 'root' }, "", window.location.pathname);
            }
            renderTree();
        }

        function getAbsoluteDepth(nodeId) {
            if (nodeId === 'root') return 0;
            let depth = 0;
            let currentId = nodeId;
            while (currentId !== 'root' && globalData[currentId]) {
                depth++;
                currentId = globalData[currentId].parentId;
            }
            return depth;
        }

        function hitungGenerasi(absDepth) {
            if (absDepth === 1) return "Leluhur";
            if (absDepth === 2) return "Opung";
            if (absDepth === 3) return "Anak opung";
            if (absDepth === 4) return "Cucu opung";
            if (absDepth === 5) return "Cicit opung";
            if (absDepth === 6) return "Entai opung";
            return "Keturunan selanjutnya"; 
        }

        function renderTree() {
            if (document.getElementById('login-modal').style.display !== 'none' ||
                document.getElementById('payment-modal').style.display === 'flex') {
                return;
            }

            const container = document.getElementById('family-tree');
            const backBtn = document.getElementById('btn-back');
            const petunjuk = document.getElementById('teks-petunjuk');
            const btnFull = document.getElementById('btn-full');
            const btnPrint = document.getElementById('btn-print');
            const btnLock = document.getElementById('btn-lock');
            
            container.innerHTML = '';

            // Tampilkan tombol Kunci (Reset) hanya jika yang login adalah Admin
            if (isAdmin) {
                btnLock.style.display = 'inline-block';
            } else {
                btnLock.style.display = 'none';
            }

            const focusDepth = getAbsoluteDepth(activeRootId);
            let modeTeks = isAdmin ? " [MODE ADMIN]" : " [MODE TAMU]";

            if (isFullView) {
                backBtn.style.display = 'none';
                btnPrint.style.display = 'inline-block'; 
                btnFull.innerHTML = "🚪 Kembali ke Mode Kamar";
                petunjuk.innerHTML = "MODE TAMPILAN FULL KESELURUHAN" + modeTeks;
            } else {
                btnPrint.style.display = 'none'; 
                btnFull.innerHTML = "👁️ Lihat Full Silsilah";
                
                if (focusDepth === 0) {
                    backBtn.style.display = 'none';
                    petunjuk.innerHTML = "HALAMAN UTAMA" + modeTeks;
                } else {
                    backBtn.style.display = 'inline-block';
                    if (focusDepth === 1) petunjuk.innerHTML = "KAMAR LELUHUR" + modeTeks;
                    else if (focusDepth === 2) petunjuk.innerHTML = "KAMAR OPUNG" + modeTeks;
                    else if (focusDepth === 3) petunjuk.innerHTML = "KAMAR ANAK" + modeTeks;
                    else petunjuk.innerHTML = "KAMAR CUCU" + modeTeks;
                }
            }

            const rootNode = globalData[activeRootId];
            if (!rootNode) {
                activeRootId = 'root';
                renderTree();
                return;
            }

            const mainUl = document.createElement('ul');
            mainUl.appendChild(createLiElement(rootNode, globalData));
            container.appendChild(mainUl);
        }

        function createLiElement(node, allData) {
            const li = document.createElement('li');
            const isAbsoluteRoot = (node.parentId === null || node.id === 'root');
            const isCurrentTop = (node.id === activeRootId);
            const absDepth = getAbsoluteDepth(node.id);
            const focusDepth = getAbsoluteDepth(activeRootId);

            function buatSpan(field, value) {
                if (isAdmin) return `<span class="editable" contenteditable="true" onblur="ubahData('${node.id}', '${field}', this.innerText)">${value}</span>`;
                else return `<span class="readonly">${value}</span>`;
            }

            if (isCurrentTop) {
                if (isAbsoluteRoot) {
                    li.innerHTML = `
                        <div class="node" style="text-align: center; min-width: 220px;">
                            <div style="font-size: 20px; font-weight: bold; color: #78350f; margin-bottom: 12px; border-bottom: 2px solid #d97706; padding-bottom: 5px;">SILSILAH KELUARGA</div>
                            <div class="btn-container" style="margin-top: 0;">
                                ${isAdmin ? `<button class="btn-add" onclick="tambahAnak('${node.id}')" title="Tambah Leluhur">+</button>` : ''}
                            </div>
                        </div>
                    `;
                } else {
                    let titleTambah = "Tambah Keturunan";
                    if (focusDepth === 1) titleTambah = "Tambah Opung";
                    if (focusDepth === 2) titleTambah = "Tambah Anak";
                    if (focusDepth === 3) titleTambah = "Tambah Cucu";
                    if (focusDepth === 4) titleTambah = "Tambah Cicit";

                    li.innerHTML = `
                        <div class="node" style="border: 3px solid #0284c7; background-color: #e0f2fe;">
                            <div style="font-size: 16px; font-weight: bold; color: #0284c7; text-align: center; margin-bottom: 10px; border-bottom: 2px solid #0284c7; padding-bottom: 5px;">📍 SEDANG DIBUKA</div>
                            <div class="info-row"><span class="label">🏷️ Catatan:</span>${buatSpan('status', node.status || '-')}</div>
                            <div class="info-row"><span class="label">👤 Nama:</span>${buatSpan('name', node.name || '-')}</div>
                            <div class="info-row"><span class="label">💍 Pasangan:</span>${buatSpan('spouse', node.spouse || '-')}</div>
                            <div class="info-row"><span class="label">📍 Domisili:</span>${buatSpan('domicile', node.domicile || '-')}</div>
                            <div class="btn-container">
                                ${isAdmin ? `<button class="btn-add" onclick="tambahAnak('${node.id}')" title="${titleTambah}">+</button>` : ''}
                            </div>
                        </div>
                    `;
                }
            } 
            else {
                let actionButtons = '';
                
                if (isFullView) {
                    if (isAdmin) actionButtons = `<button class="btn-add" onclick="tambahAnak('${node.id}')" title="Tambah ${hitungGenerasi(absDepth+1)}">+</button>`;
                } else {
                    if (absDepth === 1) actionButtons = `<button class="btn-focus" onclick="fokusKe('${node.id}')">🌳 Buka Daftar Opung</button>`;
                    else if (absDepth === 2) actionButtons = `<button class="btn-focus" onclick="fokusKe('${node.id}')">🌳 Buka Daftar Anak</button>`;
                    else if (absDepth === 3) actionButtons = `<button class="btn-focus" onclick="fokusKe('${node.id}')">🌳 Buka Daftar Cucu</button>`;
                    else if (absDepth === 4) actionButtons = `<button class="btn-focus" onclick="fokusKe('${node.id}')">🌳 Buka Daftar Cicit</button>`;
                    else {
                        if (isAdmin) actionButtons = `<button class="btn-add" onclick="tambahAnak('${node.id}')" title="Tambah ${hitungGenerasi(absDepth+1)}">+</button>`;
                    }
                }

                const deleteButton = isAdmin ? `<button class="btn-del" onclick="hapusNode('${node.id}')" title="Hapus">X</button>` : '';

                li.innerHTML = `
                    <div class="node">
                        ${deleteButton}
                        <div class="info-row" style="border-bottom: 1px dotted #b45309; padding-bottom: 5px; margin-bottom: 8px;">
                            <span class="label">🏷️ Catatan:</span>${buatSpan('status', node.status || '-')}
                        </div>
                        <div class="info-row"><span class="label">👤 Nama:</span>${buatSpan('name', node.name || '-')}</div>
                        <div class="info-row"><span class="label">💍 Pasangan:</span>${buatSpan('spouse', node.spouse || '-')}</div>
                        <div class="info-row"><span class="label">📍 Domisili:</span>${buatSpan('domicile', node.domicile || '-')}</div>
                        <div class="btn-container">${actionButtons}</div>
                    </div>
                `;
            }

            let shouldDrawChildren = true;
            if (!isFullView) {
                if (focusDepth < 4) {
                    if (absDepth > focusDepth) shouldDrawChildren = false;
                }
            }

            if (shouldDrawChildren) {
                const children = [];
                for (let id in allData) {
                    if (allData[id].parentId === node.id) children.push(allData[id]);
                }
                if (children.length > 0) {
                    const ul = document.createElement('ul');
                    children.forEach(child => ul.appendChild(createLiElement(child, allData)));
                    li.appendChild(ul);
                }
            }
            return li;
        }

        /* --- EXPORT PDF --- */
        function unduhPDF() {
            const printContainer = document.getElementById('print-area');
            printContainer.innerHTML = '';
            
            const rootNode = globalData['root'];
            if(rootNode) {
                const mainUl = document.createElement('ul');
                mainUl.appendChild(createPrintElement(rootNode, globalData));
                printContainer.appendChild(mainUl);
            }
            
            alert("TIPS AGAR GARIS RAPI DI PDF:\n\n1. Pilih tujuan ke 'Simpan sebagai PDF'.\n2. Buka menu 'Pengaturan Lainnya' (More settings).\n3. Pastikan 'Grafis Latar Belakang' dicentang.\n4. Jika kertas dirasa kurang lebar, ganti ukuran kertas ke yang lebih besar.");
            window.print();
        }

        function createPrintElement(node, allData) {
            const li = document.createElement('li');
            const isAbsoluteRoot = (node.parentId === null || node.id === 'root');

            if (isAbsoluteRoot) {
                li.innerHTML = `<div class="node" style="text-align: center; min-width: 220px;"><div style="font-size: 20px; font-weight: bold; color: #78350f; margin-bottom: 12px; border-bottom: 2px solid #d97706; padding-bottom: 5px;">SILSILAH KELUARGA</div></div>`;
            } else {
                li.innerHTML = `
                    <div class="node">
                        <div class="info-row" style="border-bottom: 1px dotted #b45309; padding-bottom: 5px; margin-bottom: 8px;">
                            <span class="label">🏷️ Catatan:</span><span class="readonly" style="color: #b45309; font-style: italic;">${node.status || '-'}</span>
                        </div>
                        <div class="info-row"><span class="label">👤 Nama:</span><span class="readonly">${node.name || '-'}</span></div>
                        <div class="info-row"><span class="label">💍 Pasangan:</span><span class="readonly">${node.spouse || '-'}</span></div>
                        <div class="info-row"><span class="label">📍 Domisili:</span><span class="readonly">${node.domicile || '-'}</span></div>
                    </div>
                `;
            }

            const children = [];
            for (let id in allData) {
                if (allData[id].parentId === node.id) children.push(allData[id]);
            }
            if (children.length > 0) {
                const ul = document.createElement('ul');
                children.forEach(child => ul.appendChild(createPrintElement(child, allData)));
                li.appendChild(ul);
            }
            return li;
        }

        function fokusKe(id) {
            isFullView = false; 
            document.getElementById('btn-full').innerHTML = "👁️ Lihat Full Silsilah";
            activeRootId = id;
            history.pushState({ id: id }, "", "?kamar=" + id); 
            renderTree();
        }

        function kembaliKeAtas() {
            if (activeRootId !== 'root' && globalData[activeRootId]) {
                const parentId = globalData[activeRootId].parentId;
                activeRootId = parentId;
                history.pushState({ id: activeRootId }, "", "?kamar=" + activeRootId); 
                renderTree();
            }
        }

        function tambahAnak(parentId) {
            if (!isAdmin) return; 
            const newId = 'node_' + Date.now() + '_' + Math.floor(Math.random() * 1000);
            const parentDepth = getAbsoluteDepth(parentId);
            const statusGenerasi = hitungGenerasi(parentDepth + 1);
            db.ref('silsilah_keluarga/' + newId).set({
                id: newId, status: statusGenerasi, name: "Nama Baru", spouse: "-", domicile: "-", parentId: parentId
            });
        }

        function ubahData(id, field, nilaiBaru) {
            if (!isAdmin) return;
            let nilaiClean = nilaiBaru.trim();
            if (nilaiClean === "") nilaiClean = "-";
            db.ref('silsilah_keluarga/' + id + '/' + field).set(nilaiClean);
        }

        function hapusNode(id) {
            if (!isAdmin) return;
            if (confirm("Hapus nama ini beserta seluruh keturunannya?")) {
                const parentId = globalData[id].parentId; 
                const updates = {};
                updates['silsilah_keluarga/' + id] = null; 
                for (let key in globalData) {
                    if (globalData[key].parentId === id) updates['silsilah_keluarga/' + key + '/parentId'] = parentId;
                }
                db.ref().update(updates).then(() => {
                    if (activeRootId === id) kembaliKeAtas();
                });
            }
        }
    </script>
</body>
</html>
